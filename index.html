<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Pixel Bounce</title>
  
  <!-- OpenGraph Meta Tags for Social Sharing -->
  <meta property="og:title" content="Pixel Bounce - HTML5 Arcade Game" />
  <meta property="og:description" content="Jump higher, collect stars, and beat your high score in this addictive HTML5 platformer!" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://pixelbounce.game" />
  <meta property="og:image" content="https://pixelbounce.game/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:site_name" content="Pixel Bounce" />
  
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Pixel Bounce - HTML5 Arcade Game" />
  <meta name="twitter:description" content="Jump higher, collect stars, and beat your high score!" />
  <meta name="twitter:image" content="https://pixelbounce.game/og-image.png" />
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }
    canvas {
      display: block;
      border: 2px solid #e94560;
      border-radius: 4px;
      max-width: 100vw;
      max-height: 100vh;
      touch-action: none;
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <canvas id="game" aria-label="Pixel Bounce game canvas"></canvas>
  <div id="aria-live" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></div>
  <script src="game.js"></script>
</body>
</html>
