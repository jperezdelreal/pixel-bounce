<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Pixel Bounce</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }
    canvas {
      display: block;
      border: 2px solid #e94560;
      border-radius: 4px;
      max-width: 100vw;
      max-height: 100vh;
      touch-action: none;
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <canvas id="game" aria-label="Pixel Bounce game canvas"></canvas>
  <div id="aria-live" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></div>
  <script src="game.js"></script>
</body>
</html>
